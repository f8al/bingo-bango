name: Deploy to GitHub Pages

# Deploys the built static site to GitHub Pages on every push to main.
# Enable Pages in repo Settings → Pages → Source: "GitHub Actions".
# Set VITE_SPOTIFY_CLIENT_ID as a repository *variable* (Settings → Secrets and
# variables → Actions → Variables) to enable real Spotify login; otherwise the
# deployed app runs in demo mode.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # Serve under /<repo>/ on a project Pages site.
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SPOTIFY_CLIENT_ID: ${{ vars.VITE_SPOTIFY_CLIENT_ID }}
        run: npm run build
      - name: SPA fallback for deep links
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
